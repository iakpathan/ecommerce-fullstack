
apiVersion: apps/v1
kind: Deployment

metadata:
  name: ecommerce-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ecommerce-app

  template:
    metadata:
      labels:
        app: ecommerce-app

    spec:
      containers:
        - name: ecommerce-app

          image: ecommerce-app

          imagePullPolicy: Never

          ports:
            - containerPort: 8080

          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-service:5432/ecommerce

            - name: SPRING_DATASOURCE_USERNAME
              value: postgres

            - name: SPRING_DATASOURCE_PASSWORD
              value: ${DB_PASSWORD}

